<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet" />

    <title>split-wise</title>
  </head>
  <body>
    <nav class="bg-black py-2">
      <div class="container">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div
              class="bg-linear-to-bl from-[#00bc85] to-[#00bba0] p-1 rounded-md"
            >
              <i data-lucide="wallet"></i>
            </div>
            <div>
              <h2>SplitWise</h2>
              <h6 class="text-[8px] text-gray-400">Share expenses fairly</h6>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-dark">
              <i data-lucide="upload" size="16"></i> Import
            </button>
            <button class="btn btn-primary">
              <i data-lucide="download"></i> Export
            </button>
          </div>
        </div>
      </div>
    </nav>

    <section class="my-10">
      <div class="container">
        <div class="flex gap-5">
          <div
            class="bg-slate-700 shadow-lg w-1/2 border border-gray-300/30 p-4 rounded-lg"
          >
            <div class="flex items-center gap-2">
              <i data-lucide="userPlus" class="text-green-400"></i>
              <h3>Add Users</h3>
            </div>
            <form class="flex items-center gap-2 my-4">
              <input
                type="text"
                placeholder="Enter name..."
                class="grow border-2 border-gray-400 rounded-lg p-2 bg-slate-800 focus:border-green-700 outline-none"
              />
              <button class="btn btn-primary py-2! px-4!">Add</button>
            </form>
            <div>
              <ul>
                <li
                  class="border border-gray-500 rounded-lg p-2 bg-slate-800 flex items-center justify-between"
                >
                  <h6>user 1</h6>
                  <i data-lucide="x" class="text-red-400 cursor-pointer"></i>
                </li>
              </ul>
            </div>
          </div>
          <div
            class="bg-slate-700 shadow-lg w-1/2 border border-gray-300/30 p-4 rounded-lg"
          >
            <div class="flex items-center gap-2">
              <i data-lucide="dollar-sign" class="text-green-400"></i>
              <h3>Add Expense</h3>
            </div>
            <form class="flex flex-col items-start gap-2 my-4">
              <div class="flex flex-col w-full gap-2">
                <label for="description">Description</label>
                <input
                  type="text"
                  id="description"
                  placeholder="e.g., Dinner, Groceries..."
                  class="border-2 border-gray-400 rounded-lg p-2 bg-slate-800 focus:border-green-700 outline-none"
                />
              </div>
              <div class="flex flex-col w-full gap-2">
                <label for="amount">Amount</label>
                <input
                  type="number"
                  id="amount"
                  placeholder="0.0"
                  class="border-2 border-gray-400 rounded-lg p-2 bg-slate-800 focus:border-green-700 outline-none"
                />
              </div>
              <div class="flex flex-col w-full gap-2">
                <label for="paid-by">Paid by</label>
                <select
                  id="paid-by"
                  class="border-2 border-gray-400 rounded-lg p-2 bg-slate-800 focus:border-green-700 outline-none"
                >
                  <option value="0">Select user...</option>
                </select>
              </div>
              <button class="btn btn-primary w-full flex justify-center">
                Add
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
